name: Build and push ingest-worker image

on:
  push:
    branches: [main]
    paths:
      - "frigate/ingest-worker/**"
      - ".github/workflows/ingest-worker-image.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/ingest-worker

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: n8n_projects
          POSTGRES_PASSWORD: test
          POSTGRES_DB: home_automation
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: frigate/ingest-worker
        run: pip install -r requirements.txt pytest

      - name: Apply schema
        working-directory: frigate/ingest-worker
        env:
          MQTT_HOST: localhost
          POSTGRES_HOST: localhost
          POSTGRES_USER: n8n_projects
          POSTGRES_PASSWORD: test
          POSTGRES_DB: home_automation
          FRIGATE_API_BASE: http://frigate.test:5000
          API_KEY: test-key
          # config.py defaults to /app/schema.sql (the production container's layout) -- here
          # we're running straight from the checked-out repo, with the working directory already
          # set to frigate/ingest-worker below, so the plain relative filename resolves correctly.
          SCHEMA_SQL_PATH: schema.sql
        run: python -c "import db; db.ensure_schema()"

      - name: Run tests
        working-directory: frigate/ingest-worker
        env:
          MQTT_HOST: localhost
          POSTGRES_HOST: localhost
          POSTGRES_USER: n8n_projects
          POSTGRES_PASSWORD: test
          POSTGRES_DB: home_automation
          FRIGATE_API_BASE: http://frigate.test:5000
          API_KEY: test-key
          # At least one test calls db.ensure_schema() directly -- same reasoning as the "Apply
          # schema" step above.
          SCHEMA_SQL_PATH: schema.sql
        # `python -m pytest`, not bare `pytest` -- the test files do `import db`/`import config`
        # etc. (plain sibling modules, no package/__init__.py), which only resolves if the current
        # directory is on sys.path. `python -m` adds it automatically; the bare `pytest` console
        # script does not, which fails every test file's collection with ModuleNotFoundError
        # despite working fine locally under `python -m pytest` (confirmed by reproducing the
        # exact CI failure locally with plain `pytest -q` before applying this fix).
        run: python -m pytest -q

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        # Computed directly instead of via docker/metadata-action: that action makes an
        # unconditional internal `repos.get()` GitHub API call on every run (baked into its
        # main.ts, not something any input can disable) which has been intermittently returning
        # a malformed (HTML, not JSON) response on this repo's Actions runners -- confirmed not
        # our config (repo is public, api.github.com/repos/... returns clean 200 JSON from here,
        # GitHub status is green) and not a known bug in the action itself (reproduced the exact
        # dist bundle locally with no/bad tokens -- always got normal Octokit JSON errors, never
        # this HTML). Our actual usage is two plain tags plus standard OCI labels -- simple enough
        # to compute directly and drop the dependency on that flaky, unnecessary API call.
        id: meta
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          SHORT_SHA="${GITHUB_SHA::7}"
          {
            echo "tags<<TAGS_EOF"
            echo "${IMAGE}:latest"
            echo "${IMAGE}:${SHORT_SHA}"
            echo "TAGS_EOF"
          } >> "$GITHUB_OUTPUT"
          {
            echo "labels<<LABELS_EOF"
            echo "org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}"
            echo "org.opencontainers.image.revision=${{ github.sha }}"
            echo "org.opencontainers.image.created=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "LABELS_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./frigate/ingest-worker
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  prune-old-versions:
    # Every push here builds one new image (tagged both :latest and :<short-sha> on the same
    # digest -- see "Extract image metadata" above), so the old :latest from last time becomes
    # just another old short-sha-tagged version nothing ever cleans up on its own -- GHCR keeps
    # every version indefinitely by default. This keeps only the single newest version (the one
    # build-and-push just pushed), deleting every older one each time this workflow runs.
    #
    # Trade-off: this also deletes any older short-sha tag you might have wanted to keep around
    # for a manual rollback (docker-compose.yml's INGEST_WORKER_IMAGE_TAG can pin to one) -- if
    # you ever need that, increase min-versions-to-keep below instead of relying on old tags
    # surviving indefinitely.
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Delete old ingest-worker package versions
        # GITHUB_TOKEN can push/pull GHCR packages (packages: write above), but GitHub's package
        # deletion API rejects it regardless of workflow permissions -- deleting requires a
        # classic PAT with the delete:packages scope (read:packages too, to list versions first).
        # Create one at https://github.com/settings/tokens, add it as a repo secret named
        # GHCR_CLEANUP_TOKEN -- until that secret exists this step just fails here, without
        # affecting the image build-and-push already pushed above.
        uses: actions/delete-package-versions@v5
        with:
          package-name: ${{ github.event.repository.name }}/ingest-worker
          package-type: container
          min-versions-to-keep: 1
          token: ${{ secrets.GHCR_CLEANUP_TOKEN }}
