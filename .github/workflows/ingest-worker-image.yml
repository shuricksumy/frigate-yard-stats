name: Build and push ingest-worker image

on:
  push:
    branches: [main]
    paths:
      - "frigate/ingest-worker/**"
      - ".github/workflows/ingest-worker-image.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/ingest-worker

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5.7.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # metadata-action always calls the GitHub API to resolve repo info (default branch,
          # used internally for `edge`-type tags) regardless of which tag types are configured --
          # without an explicit github-token it falls back to process.env.GITHUB_TOKEN, which this
          # workflow never exports, so that call runs unauthenticated and 404s against this repo.
          github-token: ${{ secrets.GITHUB_TOKEN }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./frigate/ingest-worker
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
