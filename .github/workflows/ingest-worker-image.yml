name: Build and push ingest-worker image

on:
  push:
    branches: [main]
    paths:
      - "frigate/ingest-worker/**"
      - ".github/workflows/ingest-worker-image.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/ingest-worker

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        # pgvector-enabled, matching docker-compose.yml's postgres-projects image -- schema.sql's
        # CREATE EXTENSION IF NOT EXISTS vector needs the extension actually present in the image,
        # not just SQL to enable it (same class of gap the ffmpeg CI fix addressed: a runtime
        # capability the code now depends on, silently missing from the CI service container).
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: n8n_projects
          POSTGRES_PASSWORD: test
          POSTGRES_DB: home_automation
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ffmpeg
        # Matches the Dockerfile's own `apt-get install -y ffmpeg` -- report.py's _img_cell (via
        # crop.scale_image_base64) shells out to a real ffmpeg binary to build the report
        # thumbnail, and the runner doesn't have one preinstalled (confirmed: this exact CI job
        # failed with FileNotFoundError: 'ffmpeg' once a test started exercising that path for
        # real instead of mocking subprocess like test_crop.py's tests do).
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install dependencies
        working-directory: frigate/ingest-worker
        run: pip install -r requirements.txt pytest

      - name: Apply schema
        working-directory: frigate/ingest-worker
        env:
          MQTT_HOST: localhost
          POSTGRES_HOST: localhost
          POSTGRES_USER: n8n_projects
          POSTGRES_PASSWORD: test
          POSTGRES_DB: home_automation
          FRIGATE_API_BASE: http://frigate.test:5000
          API_KEY: test-key
          # config.py defaults to /app/schema.sql (the production container's layout) -- here
          # we're running straight from the checked-out repo, with the working directory already
          # set to frigate/ingest-worker below, so the plain relative filename resolves correctly.
          SCHEMA_SQL_PATH: schema.sql
        run: python -c "import db; db.ensure_schema()"

      - name: Run tests
        working-directory: frigate/ingest-worker
        env:
          MQTT_HOST: localhost
          POSTGRES_HOST: localhost
          POSTGRES_USER: n8n_projects
          POSTGRES_PASSWORD: test
          POSTGRES_DB: home_automation
          FRIGATE_API_BASE: http://frigate.test:5000
          API_KEY: test-key
          # At least one test calls db.ensure_schema() directly -- same reasoning as the "Apply
          # schema" step above.
          SCHEMA_SQL_PATH: schema.sql
        # `python -m pytest`, not bare `pytest` -- the test files do `import db`/`import config`
        # etc. (plain sibling modules, no package/__init__.py), which only resolves if the current
        # directory is on sys.path. `python -m` adds it automatically; the bare `pytest` console
        # script does not, which fails every test file's collection with ModuleNotFoundError
        # despite working fine locally under `python -m pytest` (confirmed by reproducing the
        # exact CI failure locally with plain `pytest -q` before applying this fix).
        run: python -m pytest -q

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        # Lets the amd64 GitHub-hosted runner cross-build the arm64 image too (e.g. for a
        # Raspberry Pi / other arm64 host running ingest-worker) via emulation -- Buildx alone
        # can only build for the runner's own native architecture without this.
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        # Computed directly instead of via docker/metadata-action: that action makes an
        # unconditional internal `repos.get()` GitHub API call on every run (baked into its
        # main.ts, not something any input can disable) which has been intermittently returning
        # a malformed (HTML, not JSON) response on this repo's Actions runners -- confirmed not
        # our config (repo is public, api.github.com/repos/... returns clean 200 JSON from here,
        # GitHub status is green) and not a known bug in the action itself (reproduced the exact
        # dist bundle locally with no/bad tokens -- always got normal Octokit JSON errors, never
        # this HTML). Our actual usage is two plain tags plus standard OCI labels -- simple enough
        # to compute directly and drop the dependency on that flaky, unnecessary API call.
        id: meta
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          SHORT_SHA="${GITHUB_SHA::7}"
          {
            echo "tags<<TAGS_EOF"
            echo "${IMAGE}:latest"
            echo "${IMAGE}:${SHORT_SHA}"
            echo "TAGS_EOF"
          } >> "$GITHUB_OUTPUT"
          {
            echo "labels<<LABELS_EOF"
            echo "org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}"
            echo "org.opencontainers.image.revision=${{ github.sha }}"
            echo "org.opencontainers.image.created=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "LABELS_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./frigate/ingest-worker
          push: true
          # amd64 (the existing NVR/pipeline hosts) plus arm64 (e.g. a Raspberry Pi or other
          # arm64 host) -- Buildx assembles both into one multi-arch manifest under the same
          # tags, so `docker pull`/`docker compose` on either architecture transparently gets
          # the right image with no separate tag or config needed.
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
