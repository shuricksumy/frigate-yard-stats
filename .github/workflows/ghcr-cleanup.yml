name: GHCR package cleanup

# ingest-worker-image.yml pushes a `latest` tag and a short-sha tag on every push to main, plus a
# version tag (e.g. v1.1) on a release tag push -- the sha tags accumulate forever with nothing to
# clean them up. Ran dry-run/manual-only first, reviewed the "would delete" output (221 old
# digests, latest/release tags untouched), then went live here. Still runnable on demand via
# workflow_dispatch alongside the schedule.
on:
  workflow_dispatch: {}
  schedule:
    - cron: "17 3 * * 0" # Sundays 03:17 UTC

permissions:
  packages: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete old ghcr.io package versions
        uses: dataaxiom/ghcr-cleanup-action@v1.2.2
        with:
          owner: shuricksumy
          package: 'frigate-yard-stats/ingest-worker'
          # Keep `latest` and any release tag (v1, v1.1, v1.1.0, ...); delete every other tag
          # (i.e. every short-sha build tag) plus orphaned untagged multi-arch layers.
          delete-tags: '.*'
          # Flat alternation instead of a quantified group with an internal quantifier
          # (`(\.[0-9]+)*`) -- the latter trips the action's ReDoS heuristic (nested quantifiers)
          # even though it isn't actually vulnerable; confirmed live (a real dry-run failed with
          # "exclude-tags: regex pattern rejected as ReDoS-prone").
          exclude-tags: '^latest$|^v[0-9]+$|^v[0-9]+\.[0-9]+$|^v[0-9]+\.[0-9]+\.[0-9]+$'
          use-regex: true
          delete-untagged: true
          dry-run: false
          log-level: info
