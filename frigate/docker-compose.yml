# One file, two independent stacks that still deploy to two different hosts -- Compose profiles
# keep them from starting on the wrong host by accident (a bare `docker compose up -d` with no
# profile starts nothing). On the n8n/Flowise host: `docker compose --profile pipeline up -d`.
# On the Frigate/camera host: `docker compose --profile nvr up -d`. Same shared `.env` on both
# (see .env.example) -- each service only reads the environment variables it references.
networks:
  # Shared network name/convention used on both hosts (each host creates its own local instance
  # of "npm_proxy" -- these are two separate networks that happen to share a name, not one
  # network spanning hosts). Pipeline services join it too so they're reachable the same way
  # n8n/other containers on that host already are.
  npm_proxy:
    name: npm_proxy
    driver: bridge
    ipam:
      config:
        - subnet: 172.111.0.0/24
  # Frigate NVR host network.
  hassio:
    external: true

services:
  # -------------------------------------------------
  # Pipeline (n8n/Flowise host): postgres-projects + ingest-worker
  # -------------------------------------------------
  postgres-projects:
    profiles: ["pipeline"]
    # pgvector/pgvector:pg16 is a drop-in build on top of postgres:16 -- same data directory
    # format, existing volumes/data untouched -- that additionally bundles the `vector` extension
    # (CREATE EXTENSION vector, applied by schema.sql) for the semantic-search embedding columns
    # on vehicle_sightings/person_sightings.
    image: pgvector/pgvector:pg16
    container_name: postgres-projects
    restart: unless-stopped
    environment:
      POSTGRES_USER: n8n_projects
      POSTGRES_PASSWORD: ${POSTGRES_PROJECTS_PASSWORD}
      POSTGRES_DB: home_automation
    volumes:
      - ./postgres-projects/data:/var/lib/postgresql/data
      # No init-script mount -- ingest-worker applies schema.sql itself on every startup
      # (idempotent CREATE ... IF NOT EXISTS), which is more reliable than initdb's
      # "only runs on a brand new empty volume" behavior.
    networks:
      - npm_proxy
    # no ports: exposed externally — n8n reaches it over the internal docker network only

  ingest-worker:
    profiles: ["pipeline"]
    # Pulled from GHCR (built by .github/workflows/ingest-worker-image.yml on every push to
    # frigate/ingest-worker/**). Override with `build: ./ingest-worker` instead for local dev.
    image: ghcr.io/shuricksumy/frigate-yard-stats/ingest-worker:${INGEST_WORKER_IMAGE_TAG:-latest}
    container_name: ingest-worker
    restart: unless-stopped
    environment:
      MQTT_HOST: ${MQTT_HOST}
      MQTT_PORT: ${MQTT_PORT:-1883}
      MQTT_USERNAME: ${MQTT_USERNAME}
      MQTT_PASSWORD: ${MQTT_PASSWORD}
      # Optional camera allow-list, comma-separated -- applies to both the events and alerts
      # flows at ingest time. Blank/unset (default) means no filter, every camera is processed.
      CAMERAS: ${CAMERAS:-}
      POSTGRES_HOST: postgres-projects
      POSTGRES_DB: home_automation
      POSTGRES_USER: n8n_projects
      POSTGRES_PASSWORD: ${POSTGRES_PROJECTS_PASSWORD}
      FRIGATE_API_BASE: ${FRIGATE_API_BASE}
      # Full-res record-stream resolution -- confirmed via `ffmpeg -i rtsp://127.0.0.1:8554/out`
      # on the Frigate host (both outside/outside2 record streams are 3840x2160).
      RECORD_WIDTH: ${RECORD_WIDTH:-3840}
      RECORD_HEIGHT: ${RECORD_HEIGHT:-2160}
      # Crop tuning -- MAX_CROP_DIMENSION caps the cropped JPEG's long side (VLMs downsample
      # beyond this anyway); CROP_PADDING_PCT is extra margin around Frigate's `region` box;
      # CROP_FRAME_OFFSET_PCT is where in the event's span to seek (0.5 = midpoint, the default).
      MAX_CROP_DIMENSION: ${MAX_CROP_DIMENSION:-1280}
      # Smaller copy of the same crop for report/preview UIs (see report.py) -- not the same knob
      # as MAX_CROP_DIMENSION, which VLM calls still use at full size.
      THUMBNAIL_MAX_DIMENSION: ${THUMBNAIL_MAX_DIMENSION:-240}
      CROP_PADDING_PCT: ${CROP_PADDING_PCT:-0.2}
      CROP_FRAME_OFFSET_PCT: ${CROP_FRAME_OFFSET_PCT:-0.5}
      # Skips the crop filter entirely (crop_image_base64 becomes the full original frame, still
      # scaled to MAX_CROP_DIMENSION) -- affects both the web UI display and what gets sent to the
      # VLM, since they share this one field. Off by default: the crop exists so the model can
      # read small detail (plates, notable features) a full wide frame makes illegible.
      CROP_DISABLED: ${CROP_DISABLED:-false}
      # Uses Frigate's own already-rendered event snapshot (its own best-detection-score frame)
      # instead of seeking+cropping a frame from the record-stream clip -- trades Frigate's fixed
      # lower detect-stream resolution and a burned-in bbox/label/timestamp overlay (this Frigate
      # version's API has no way to suppress it) for often-better framing/timing than our own
      # fixed-offset guess. Ignores CROP_DISABLED/CROP_FRAME_OFFSET_PCT/CROP_PADDING_PCT when true.
      # Events only -- a visit's own composite grid (VISIT_THUMB_CROP_ENABLED) is unaffected.
      FRIGATE_SNAPSHOT_ENABLED: ${FRIGATE_SNAPSHOT_ENABLED:-false}
      # Queue tuning -- how many events may be crop_status='processing' at once, how long
      # before a stuck one is reclaimed, how many crop failures before giving up on an event,
      # and how often the poll loop checks for new work.
      PARALLEL_LIMIT: ${PARALLEL_LIMIT:-2}
      STALE_MINUTES: ${STALE_MINUTES:-5}
      MAX_ATTEMPTS: ${MAX_ATTEMPTS:-3}
      # Frigate is still finalizing the event/clip when "end" fires -- wait this long before the
      # first crop attempt on a freshly claimed row (same idea as VIDEO_INITIAL_WAIT_SECONDS).
      CROP_INITIAL_WAIT_SECONDS: ${CROP_INITIAL_WAIT_SECONDS:-5}
      POLL_INTERVAL_SECONDS: ${POLL_INTERVAL_SECONDS:-5}
      # How long to keep data before it's deleted, and how often to check.
      RETENTION_MONTHS: ${RETENTION_MONTHS:-12}
      RETENTION_CHECK_INTERVAL_SECONDS: ${RETENTION_CHECK_INTERVAL_SECONDS:-86400}
      API_PORT: ${INGEST_WORKER_API_PORT:-8080}
      # Required on /events, /sightings, /stats, /reports (X-API-Key header) -- NOT on
      # /health, /status, /crop/{id}, /retention/run, which stay unauthenticated.
      API_KEY: ${API_KEY}
      # Video storage (third queue stage, video_status) -- see video.py/video_worker.py.
      # Disabled by default; when on, clips are downloaded from Frigate's own clip.mp4 endpoint,
      # stored under /data/video (bind-mounted below), and only the filesystem path lives in
      # Postgres (video_path).
      STORE_VIDEO: ${STORE_VIDEO:-false}
      VIDEO_STORAGE_PATH: /data/video
      VIDEO_PARALLEL_LIMIT: ${VIDEO_PARALLEL_LIMIT:-1}
      VIDEO_INITIAL_WAIT_SECONDS: ${VIDEO_INITIAL_WAIT_SECONDS:-10}
      VIDEO_MIN_VALID_BYTES: ${VIDEO_MIN_VALID_BYTES:-1000}
      VIDEO_MAX_ATTEMPTS: ${VIDEO_MAX_ATTEMPTS:-5}
      # Optional -- if set, never claim video for rows older than this many hours (Frigate's
      # continuous-recording buffer that clips come from has a much shorter retention than its
      # saved events, so a backlogged worker attempting a very old row just burns attempts on a
      # clip that's very likely already gone). Unset/blank = no age limit.
      VIDEO_MAX_AGE_HOURS: ${VIDEO_MAX_AGE_HOURS:-}
      VIDEO_RETRY_WAIT_SECONDS: ${VIDEO_RETRY_WAIT_SECONDS:-5}
      # Independent video-storage switch for the alerts/visits flow (frigate/reviews) -- one clip
      # per visit's whole span, separate from STORE_VIDEO above. Shares the VIDEO_* tuning above,
      # but stored under its own mount point (/data/video-alerts, bind-mounted below) so the two
      # flows' disk usage can be measured/managed independently.
      STORE_VIDEO_ALERTS: ${STORE_VIDEO_ALERTS:-false}
      VIDEO_STORAGE_PATH_ALERTS: /data/video-alerts
      # Independent visit-level preview -- a composite grid image sampling frames proportionally
      # across the visit's own clip, plus a separate animated GIF for human preview, instead of
      # seeking to one precise "best moment" (Frigate's thumb_time turned out unreliable to seek
      # to -- see crop.build_visit_preview). Only known once the review closes, so this is a
      # separate poll-loop stage/artifacts (visits.crop_image_base64/preview_gif_base64), not a
      # replacement for the events-flow crop. Off by default.
      VISIT_THUMB_CROP_ENABLED: ${VISIT_THUMB_CROP_ENABLED:-false}
      VISIT_THUMB_CROP_PARALLEL_LIMIT: ${VISIT_THUMB_CROP_PARALLEL_LIMIT:-1}
      VISIT_THUMB_CROP_INITIAL_WAIT_SECONDS: ${VISIT_THUMB_CROP_INITIAL_WAIT_SECONDS:-5}
      VISIT_THUMB_CROP_MAX_ATTEMPTS: ${VISIT_THUMB_CROP_MAX_ATTEMPTS:-3}
      VISIT_THUMB_CROP_RETRY_WAIT_SECONDS: ${VISIT_THUMB_CROP_RETRY_WAIT_SECONDS:-5}
      # Which 4 points of the visit's own clip duration to sample for the preview grid/GIF, as
      # percentages (0=clip start, 100=clip end) -- e.g. "5,35,65,90" to stay clear of both edges.
      VISIT_PREVIEW_FRAME_PERCENTAGES: ${VISIT_PREVIEW_FRAME_PERCENTAGES:-0,25,50,100}
      # Telegram notifications -- none/image/video/all, not a bool (see telegram.py). "none" by
      # default; TELEGRAM_BOT_TOKEN/TELEGRAM_CHAT_ID only need to be set when either mode below
      # isn't "none".
      TELEGRAM_EVENTS_MODE: ${TELEGRAM_EVENTS_MODE:-none}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      # Defaults to Telegram's own cloud API. Point at the optional telegram-bot-api service
      # below instead (e.g. http://telegram-bot-api:8081, Compose service-name DNS) for lower
      # latency and a 2000MB upload cap instead of the cloud API's 50MB -- see that service's
      # own comment for when this is worth turning on.
      TELEGRAM_API_BASE_URL: ${TELEGRAM_API_BASE_URL:-https://api.telegram.org}
      # Independent mode for the alerts/visits flow -- one summary notification per visit ("image")
      # and/or the visit's own clip as a reply ("video"), instead of the per-event photo/video
      # messages TELEGRAM_EVENTS_MODE controls.
      TELEGRAM_ALERTS_MODE: ${TELEGRAM_ALERTS_MODE:-none}
      # Object labels your Frigate config actually produces -- drives the web UI's Type filter
      # dropdown (GET /object-types) so it doesn't need a frontend change to pick up a new label.
      OBJECT_TYPES: ${OBJECT_TYPES:-car,truck,person,dog}
      # Internal AI stages (ai_worker.py / alert_ai_worker.py) -- an alternative to
      # n8n/metadata-processor.json, not a replacement for it (that workflow still works, just
      # needs to stay deactivated in n8n while AI_EVENTS_STAGE_ENABLED is on, since both claim from
      # the same ai_status queue). Both off by default -- see CLAUDE.md's "Internal AI stage"
      # section before enabling. Independent switches: AI_EVENTS_STAGE_ENABLED analyzes each
      # event's own crop with profiles.yaml's event_prompt; AI_ALERTS_ENABLED analyzes a visit's
      # composite grid (needs VISIT_THUMB_CROP_ENABLED=true to have anything to claim) with
      # alert_prompt, storing results separately in visit_vehicle_sightings/visit_person_sightings.
      AI_EVENTS_STAGE_ENABLED: ${AI_EVENTS_STAGE_ENABLED:-false}
      AI_ALERTS_ENABLED: ${AI_ALERTS_ENABLED:-false}
      AI_STAGE_PROFILE_PATH: ${AI_STAGE_PROFILE_PATH:-/app/profiles.yaml}
      AI_STAGE_PARALLEL_LIMIT: ${AI_STAGE_PARALLEL_LIMIT:-2}
      AI_STAGE_STALE_MINUTES: ${AI_STAGE_STALE_MINUTES:-5}
      AI_STAGE_MAX_ATTEMPTS: ${AI_STAGE_MAX_ATTEMPTS:-3}
      AI_STAGE_MAX_AGE_HOURS: ${AI_STAGE_MAX_AGE_HOURS:-}
      AI_STAGE_POLL_INTERVAL_SECONDS: ${AI_STAGE_POLL_INTERVAL_SECONDS:-5}
      # llama_slot_proxy's own base URL/token, called directly instead of going through n8n --
      # only required when AI_EVENTS_STAGE_ENABLED or AI_ALERTS_ENABLED is true. LLAMA_PROXY_TOKEN
      # is optional (blank = no Authorization header sent -- llama_slot_proxy is unauthenticated on
      # the LAN today).
      LLAMA_PROXY_BASE_URL: ${LLAMA_PROXY_BASE_URL:-}
      LLAMA_PROXY_TOKEN: ${LLAMA_PROXY_TOKEN:-}
      LLAMA_PROXY_EMBED_PATH: ${LLAMA_PROXY_EMBED_PATH:-/REPLACE_WITH_EMBED_SLOT/v1/embeddings}
      # Fallback chat-completion timeout for a profiles.yaml entry that doesn't set its own
      # timeout_seconds -- a local model can genuinely take minutes; the real per-type value lives
      # in profiles.yaml, this is only the fallback. Embeddings get their own, shorter default.
      AI_STAGE_DEFAULT_TIMEOUT_SECONDS: ${AI_STAGE_DEFAULT_TIMEOUT_SECONDS:-180}
      AI_STAGE_EMBED_TIMEOUT_SECONDS: ${AI_STAGE_EMBED_TIMEOUT_SECONDS:-60}
      # Must match the output size of whatever model is loaded behind LLAMA_PROXY_EMBED_PATH --
      # sizes the pgvector embedding columns; see .env.example for the full explanation.
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-1024}
    ports:
      # Admin/debug endpoints (unauthenticated) plus the read/query/report API (X-API-Key
      # required) plus the static web report UI at /ui -- Swagger UI at /docs, ReDoc at /redoc.
      # Not used by the normal pipeline (MQTT in, Postgres out, poll loop) -- purely for manual
      # testing, for n8n to call, and for the browser-based report.
      - "${INGEST_WORKER_API_PORT:-8080}:${INGEST_WORKER_API_PORT:-8080}"
    volumes:
      # Bind mount for stored clips -- only used when STORE_VIDEO=true, but always mounted so
      # toggling the flag doesn't require a compose file change, just a restart.
      - ${VIDEO_STORAGE_HOST_PATH:-./video-storage}:/data/video
      # Separate bind mount for the alerts/visits flow (STORE_VIDEO_ALERTS) -- its own directory,
      # not a subfolder of the one above, so the two flows' storage is genuinely independent.
      - ${VIDEO_STORAGE_ALERTS_HOST_PATH:-./video-storage-alerts}:/data/video-alerts
      # Internal AI stage's object-type/prompt/model config (see CLAUDE.md's "Internal AI stage"
      # section) -- overrides the image-baked default at the same path
      # (AI_STAGE_PROFILE_PATH=/app/profiles.yaml), so editing frigate/profiles.yaml and
      # restarting the container is enough to change prompts/models, no image rebuild needed.
      # Read-only since ai_worker.py/alert_ai_worker.py only ever read this file. Always mounted,
      # same reasoning as the video mounts above -- harmless when both AI stage flags are false,
      # no compose change needed to turn either stage on later.
      - ./profiles.yaml:/app/profiles.yaml:ro
    depends_on:
      - postgres-projects
    networks:
      - npm_proxy

  # Optional local MQTT broker -- its own profile so it's fully opt-in and never collides with
  # whatever broker is already running in production. Bring up a clean local/dev stack with
  # `docker compose --profile pipeline --profile mqtt up -d`, then point MQTT_HOST=mosquitto
  # (Compose service-name DNS) / MQTT_PORT=1883 at it instead of an external broker's IP.
  mosquitto:
    profiles: ["mqtt"]
    image: eclipse-mosquitto:2
    container_name: mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    networks:
      - npm_proxy

  # Optional self-hosted Telegram Bot API server (github.com/tdlib/telegram-bot-api, this image
  # a prebuilt wrapper around it) -- its own profile so it's fully opt-in, same pattern as
  # mosquitto above. Worth turning on once TELEGRAM_EVENTS_MODE/TELEGRAM_ALERTS_MODE actually
  # sends real traffic: it drops the public-internet round trip (ingest-worker reaches it over
  # the Docker network instead of api.telegram.org) and raises Telegram's own upload cap from
  # 50MB to 2000MB -- this project's STORE_VIDEO/STORE_VIDEO_ALERTS clips, recorded at 4K, can
  # realistically exceed the cloud API's 50MB limit and silently fail to send. Requires your own
  # api_id/api_hash from https://my.telegram.org (Telegram account, not the bot token -- a
  # separate credential the Local Bot API server needs to talk to Telegram's MTProto backend
  # directly). Bring up with `docker compose --profile pipeline --profile telegram-bot-api up -d`,
  # then set TELEGRAM_API_BASE_URL=http://telegram-bot-api:8081 (Compose service-name DNS) above
  # instead of the default api.telegram.org.
  telegram-bot-api:
    profiles: ["telegram-bot-api"]
    image: aiogram/telegram-bot-api:latest
    container_name: telegram-bot-api
    restart: unless-stopped
    environment:
      TELEGRAM_API_ID: ${TELEGRAM_API_ID}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH}
    volumes:
      - ./telegram-bot-api/data:/var/lib/telegram-bot-api
    ports:
      - "8081:8081"
    networks:
      - npm_proxy

  # -------------------------------------------------
  # Frigate NVR stack (the Frigate/camera host)
  # -------------------------------------------------
  frigate:
    profiles: ["nvr"]
    container_name: frigate
    restart: unless-stopped
    image: ghcr.io/blakeblackshear/frigate:0.17.2
    #pull_policy: always
    shm_size: "600mb" # update for your cameras based on calculation above
    devices:
      - /dev/dri
      #- /dev/dri:/dev/dri
      - /dev/bus/usb:/dev/bus/usb  # Passes the USB Coral, needs to be modified for other versions
     # - /dev/apex_0:/dev/apex_0    # Passes a PCIe Coral, follow driver instructions here https://coral.ai/docs/m2/get-started/#2a-on-linux
     # - /dev/video11:/dev/video11  # For Raspberry Pi 4B
      - /dev/dri/renderD128 # For intel hwaccel, needs to be updated for your hardware
      - /dev/dri/card0 # for intel hwaccel, needs to be updated for your hardware
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /home/hassio/homeassistant/frigate/config:/config
      - /video/frigate:/media/frigate
      - type: tmpfs # Optional: 1GB of memory, reduces SSD/SD Card wear
        target: /tmp/cache
        tmpfs:
          size: 1000000000
    # MODELS
      - /home/hassio/homeassistant/frigate/frigate-plugins/edgetpu_tfl.py:/opt/frigate/frigate/detectors/plugins/edgetpu_tfl.py:ro
      - /home/hassio/homeassistant/frigate/frigate-plugins/labels-coco17.txt:/opt/frigate/models/labels-coco17.txt:ro
      - /home/hassio/homeassistant/frigate/frigate-plugins/yolov9-s-relu6-best_320_int8_edgetpu.tflite:/opt/frigate/models/yolov9-s-relu6-best_320_int8_edgetpu.tflite:ro
      - /home/hassio/homeassistant/frigate/frigate-plugins/yolov9-s-relu6-tpumax_320_int8_edgetpu.tflite:/opt/frigate/models/yolov9-s-relu6-tpumax_320_int8_edgetpu.tflite:ro
      - /home/hassio/homeassistant/frigate/frigate-plugins/yolov9-s-relu6-tpumax_512_int8_edgetpu.tflite:/opt/frigate/models/yolov9-s-relu6-tpumax_512_int8_edgetpu.tflite:ro
      - /home/hassio/homeassistant/frigate/frigate-plugins/yolov9-s-hardswish-tpumax_320_int8_edgetpu.tflite:/opt/frigate/models/yolov9-s-hardswish-tpumax_320_int8_edgetpu.tflite:ro
    cap_add:
      - CAP_PERFMON
    networks:
      - npm_proxy
      - hassio
    ports:
      - 1984:1984
      - 5000:5000
#      - 8554:8554/tcp
#      - 8554:8554/udp
#      - 8555:8555/tcp
#      - 8555:8555/udp
#      - "${FRIGATE_HOST_IP}:5000:5000"
      - "${FRIGATE_HOST_IP}:8554:8554/tcp" # RTSP feeds
      - "${FRIGATE_HOST_IP}:8554:8554/udp" # RTSP feeds
      - "${FRIGATE_HOST_IP}:8555:8555/tcp" # WebRTC over tcp
      - "${FRIGATE_HOST_IP}:8555:8555/udp" # WebRTC over udp

    environment:
      FRIGATE_MQTT_PASSWORD: ${FRIGATE_MQTT_PASSWORD}
      FRIGATE_RTSP_PASSWORD: ${FRIGATE_RTSP_PASSWORD}
      # Referenced by frigate.conf's {FRIGATE_MQTT_HOST}/{FRIGATE_CAM1_IP}/{FRIGATE_CAM2_IP}
      # template vars -- Frigate substitutes these from its own container environment.
      FRIGATE_MQTT_HOST: ${FRIGATE_MQTT_HOST}
      FRIGATE_CAM1_IP: ${FRIGATE_CAM1_IP}
      FRIGATE_CAM2_IP: ${FRIGATE_CAM2_IP}
      # LIBVA_DRIVER_NAME: i965
