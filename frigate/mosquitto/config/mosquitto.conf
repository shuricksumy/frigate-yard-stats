# Local/dev broker for the opt-in `mqtt` compose profile. allow_anonymous is fine for a
# LAN-only homelab broker used to bring the pipeline up from scratch -- if this container is
# ever reachable beyond the npm_proxy/hassio networks, switch to a password_file instead
# (mosquitto_passwd -c /mosquitto/config/passwd <user>, then
# `password_file /mosquitto/config/passwd` + `allow_anonymous false` below).

listener 1883
allow_anonymous true

persistence true
persistence_location /mosquitto/data/

log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
