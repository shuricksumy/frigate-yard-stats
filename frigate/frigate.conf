camera_groups:
  # Required: Name of camera group
  Person:
    order: 3
    icon: LuPersonStanding
    cameras:
      - outside
      - outside2
  Cars:
    order: 0
    icon: LuCar
    cameras:
      - outside
      - outside2
  # 'Hall' group removed — it referenced the commented-out front_door
  # camera. Re-add once front_door is uncommented:
  # Hall:
  #   order: 2
  #   icon: LuDoorOpen
  #   cameras:
  #     - front_door

detect:
  enabled: true
  fps: 5
  stationary:
    classifier: true
    interval: 25 # Default is good; it checks occasionally to ensure the car is still there
    threshold: 15 # After 15 frames (3s at fps:5) of no movement, it's marked "stationary"
    max_frames:
      # max_frames bounds how long Frigate keeps tracking a stationary object as the SAME object
      # before dropping it (memory concerns). Once dropped, if the object is still there and gets
      # re-detected, Frigate treats it as a brand new object -> a fresh duplicate event, even
      # though nothing actually moved. At fps:5, the previous value (500 = 100s) meant a parked
      # car re-triggered a new event roughly every 100 seconds it sat in the driveway -- this is
      # what was flooding raw_events with near-duplicate car rows. 50000 frames = ~2.75 hours at
      # fps:5; raise further (e.g. 90000 for ~5 hours) if cars are typically parked longer than
      # that between moves.
      objects:
        car: 50000

# -------------------------------------------------
# Version identifier (keep it in sync with the image you pull)
# -------------------------------------------------
version: 0.17.2
semantic_search:
  enabled: true
  model_size: large
face_recognition:
  enabled: false
  model_size: large
classification:
  bird:
    enabled: false

logger:
  default: info
  # license_plate debug logging removed — lpr.enabled is false globally,
  # so this was logging nothing useful. Re-enable when you turn LPR on:
  # logs:
  #   frigate.data_processing.common.license_plate: debug
