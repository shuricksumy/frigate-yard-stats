# -------------------------------------------------
# Global configuration
# -------------------------------------------------
mqtt:
  host: "{FRIGATE_MQTT_HOST}"
  port: 1883
  topic_prefix: frigate
  client_id: frigate
  user: frigate
  password: "{FRIGATE_MQTT_PASSWORD}"
  stats_interval: 60

ffmpeg:
  hwaccel_args: preset-vaapi
  # hwaccel_args: preset-intel-qsv-h264
  # hwaccel_args: preset-intel-qsv-h265

model:
  model_type: yolo-generic
  labelmap_path: /opt/frigate/models/labels-coco17.txt
  ##path: /opt/frigate/models/yolov9-s-relu6-best_320_int8_edgetpu.tflite
  ##path: /opt/frigate/models/yolov9-s-relu6-tpumax_320_int8_edgetpu.tflite
  path: /opt/frigate/models/yolov9-s-relu6-tpumax_512_int8_edgetpu.tflite
  ##path: /opt/frigate/models/yolov9-s-hardswish-tpumax_320_int8_edgetpu.tflite

  # Optionally specify the model dimensions (these are the same as Frigate's default 320x320)
  width: 512
  height: 512

detectors:
  coral:
    type: edgetpu
    device: usb

# One CPU detector that uses 4 threads (adjust if you need more)
#detectors:
#  cpu:
#    type: cpu
#    num_threads: 4

objects:
  track:
    - car
    - person
    - truck
    - dog
  filters:
    # This is where we tell Frigate to be patient before confirming
    # It applies to all tracked objects
    car:
      min_area: 5000
      threshold: 0.75
      min_score: 0.45
      min_ratio: 1.3
      max_ratio: 4.0
    #person:
    #  min_area: 500
    #  threshold: 0.65

review:
  alerts:
    labels:
      - person
      - car
      - truck
      - dog

# LPR global configuration
lpr:
  enabled: true
  device: CPU # can also be GPU if available and correct Docker image is used
  detection_threshold: 0.7 # change if necessary
  debug_save_plates: true

  known_plates:
    # Example only -- replace with your own known plates before deploying.
    # Frigate matches any of the listed variants against its LPR read for that vehicle.
    Example_Vehicle:
      - ABC-1234
      - ABC1234

go2rtc:
  streams:
    out:
      - ffmpeg:rtsp://admin:{FRIGATE_RTSP_PASSWORD}@{FRIGATE_CAM1_IP}:554/stream1#input=rtsp/udp
    out_sub:
      - ffmpeg:rtsp://admin:{FRIGATE_RTSP_PASSWORD}@{FRIGATE_CAM1_IP}:554/stream2#input=rtsp/udp
    out2:
      - ffmpeg:rtsp://admin:{FRIGATE_RTSP_PASSWORD}@{FRIGATE_CAM2_IP}:554/stream1#input=rtsp/udp
    out2_sub:
      - ffmpeg:rtsp://admin:{FRIGATE_RTSP_PASSWORD}@{FRIGATE_CAM2_IP}:554/stream2#input=rtsp/udp
    #front_door:
    #  - ffmpeg:rtsp://shurick:{FRIGATE_FRONT_DOOR_PASSWORD}@03cabcc9-ring-mqtt:8554/3ce1a1aef114_live

# -------------------------------------------------
# Camera definitions
# -------------------------------------------------
cameras:
  # -------------------------------------------------
  # Outside camera (person + car merged, first RTSP pair)
  # -------------------------------------------------
  outside:
    ffmpeg:
      output_args:
        record: preset-record-generic-audio-aac
      inputs:
        - path: rtsp://127.0.0.1:8554/out
          input_args: preset-rtsp-generic
          roles: [audio, record]
        - path: rtsp://127.0.0.1:8554/out_sub
          input_args: preset-rtsp-restream-low-latency
          roles: [detect]

    detect:
      enabled: true
      #fps: 5

    live:
      streams:
        out_sub: out_sub

    snapshots:
      enabled: true

    lpr:
      enabled: true
      enhancement: 3

    objects:
      track:
        - person
        - dog
        - car
        - truck
      filters:
        car:
          min_area: 5000
          threshold: 0.75
          min_score: 0.45
          min_ratio: 1.3
          max_ratio: 4.0

    # ---------- RECORDING ----------
    record:
      enabled: true
      alerts:
        pre_capture: 10
        post_capture: 10
        retain:
          days: 5
      detections:
        pre_capture: 10
        post_capture: 10
        retain:
          days: 10
      continuous:
        days: 0
      motion:
        days: 30

    # onvif:
    #   host: <camera_1_ip>
    #   port: 80
    #   user: admin
    #   password: "{FRIGATE_CAM1_PASSWORD}"

    # NOTE: motion is camera-level; using the former person-camera's motion
    # tuning as the base since it's more sensitive. Watch the car zone for
    # noise (headlight glare/reflections) and adjust lightning_threshold /
    # improve_contrast if false positives increase.
    motion:
      threshold: 35
      contour_area: 15
      improve_contrast: true
      lightning_threshold: 0.8
      mask: 0.203,0.05,0.204,0,0.002,0.002,0,0.05

    zones:
      yard:
        coordinates: 0.978,0.103,0.664,0,0,0,0,1,0.452,1,0.837,1,0.95,0.448
        loitering_time: 0
        inertia: 3
      yard_car_zone:
        coordinates:
          0.005,0.134,0.265,0,0.664,0.002,0.882,0.056,0.868,0.165,0,0.812
        loitering_time: 0
        inertia: 3

    review:
      alerts:
        required_zones: [yard, yard_car_zone]
      detections:
        required_zones: [yard, yard_car_zone]

  # -------------------------------------------------
  # Outside2 camera (person + car merged, second RTSP pair)
  # -------------------------------------------------
  outside2:
    ffmpeg:
      output_args:
        record: preset-record-generic-audio-aac
      inputs:
        - path: rtsp://127.0.0.1:8554/out2
          input_args: preset-rtsp-generic
          roles: [audio, record]
        - path: rtsp://127.0.0.1:8554/out2_sub
          input_args: preset-rtsp-restream-low-latency
          roles: [detect]

    detect:
      enabled: true
      #fps: 5

    live:
      streams:
        out2_sub: out2_sub

    snapshots:
      enabled: true

    lpr:
      enabled: true
      enhancement: 3

    objects:
      track:
        - person
        - dog
        - car
        - truck
      filters:
        car:
          min_area: 5000
          threshold: 0.70
          min_score: 0.35
          min_ratio: 1.2
          max_ratio: 4.0

    # ---------- RECORDING ----------
    record:
      enabled: true
      alerts:
        pre_capture: 10
        post_capture: 10
        retain:
          days: 5
      detections:
        pre_capture: 10
        post_capture: 10
        retain:
          days: 10
      continuous:
        days: 0
      motion:
        days: 30

    # onvif:
    #   host: <camera_2_ip>
    #   port: 80
    #   user: admin
    #   password: "{FRIGATE_CAM2_PASSWORD}"

    # NOTE: same tradeoff as 'outside' above — using former person-camera
    # motion tuning as the base.
    motion:
      threshold: 30
      contour_area: 15
      improve_contrast: true
      mask: 0.204,0,0.206,0.056,0.012,0.06,0.036,0.554,0.161,1,-0.001,0.996,0,0

    zones:
      yard:
        coordinates: 0.161,1,0.035,0.552,0,0.166,0.239,0.06,0.47,0,1,0,1,1
        loitering_time: 0
        inertia: 3
      yard_car_zone:
        coordinates: 0.138,0.105,0.15,0.208,1,0.885,1,0,0.461,0.012
        loitering_time: 0
        inertia: 3

    review:
      alerts:
        required_zones: [yard, yard_car_zone]
      detections:
        required_zones: [yard, yard_car_zone]

  # front_door:
  #   ffmpeg:
  #     inputs:
  #       - path: rtsp://127.0.0.1:8554/front_door
  #         input_args: preset-rtsp-restream
