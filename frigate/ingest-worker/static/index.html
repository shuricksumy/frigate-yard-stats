<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yard Stats</title>
<link rel="stylesheet" href="style.css">
<!-- Vendored locally -- no CDN/outside requests. -->
<script defer src="vendor/alpine.min.js"></script>
</head>
<body x-data="eventsApp()" x-init="init()">

  <!-- Login modal: shown until an api_key cookie is present. -->
  <div class="modal-backdrop" x-show="!hasApiKey" style="display:none">
    <div class="modal">
      <h2>Yard Stats</h2>
      <p>Enter your API key to view events.</p>
      <input type="password" x-model="apiKeyInput" placeholder="API key" @keydown.enter="saveApiKey()">
      <button @click="saveApiKey()">Continue</button>
      <p class="error" x-show="loginError" x-text="loginError"></p>
    </div>
  </div>

  <div x-show="hasApiKey" style="display:none">
    <header>
      <h1>Yard Stats</h1>
      <button class="link-button" @click="logout()">Change API key</button>
    </header>

    <div class="view-toggle">
      <button type="button" :class="{ active: viewMode === 'visits' }" @click="switchView('visits')">Visits</button>
      <button type="button" :class="{ active: viewMode === 'events' }" @click="switchView('events')">Events</button>
    </div>

    <form class="filters" @submit.prevent="applyFilters()">
      <div class="filter-fields">
        <label class="search-field">
          Search AI analysis
          <input type="text" x-model="filters.q" placeholder="e.g. red toyota, plate ABC123" :title="viewMode === 'visits' ? 'Not used in Visits view -- switch to Events to search' : ''">
        </label>
        <label x-show="!advancedSearch">
          Time range
          <select x-model.number="filters.hours" :title="(filters.start || filters.end) ? 'Ignored while a custom date range (From/To) is set' : ''">
            <template x-for="h in hoursOptions" :key="h">
              <option :value="h" x-text="'Last ' + h + (h === 1 ? ' hour' : ' hours')"></option>
            </template>
          </select>
        </label>

        <div class="advanced-filters" x-show="advancedSearch" style="display:none">
          <label>
            Event ID
            <input type="number" x-model="filters.eventId" placeholder="e.g. 1234" :title="viewMode === 'visits' ? 'Not used in Visits view' : ''">
          </label>
          <label>
            From
            <input type="datetime-local" x-model="filters.start">
          </label>
          <label>
            To
            <input type="datetime-local" x-model="filters.end">
          </label>
          <label>
            Type
            <select x-model="filters.objectType">
              <option value="all">All</option>
              <template x-for="type in objectTypes" :key="type">
                <option :value="type" x-text="type.charAt(0).toUpperCase() + type.slice(1)"></option>
              </template>
            </select>
          </label>
          <label>
            AI status
            <select x-model="filters.aiStatus" :title="viewMode === 'visits' ? 'Not used in Visits view' : ''">
              <option value="all">All</option>
              <option value="new">New</option>
              <option value="processing">Processing</option>
              <option value="retry">Retry</option>
              <option value="failed">Failed</option>
              <option value="done">Done</option>
            </select>
          </label>
          <label class="checkbox-label">
            <input type="checkbox" x-model="filters.onlyWithMedia" :title="viewMode === 'visits' ? 'Not used in Visits view' : ''">
            Only with media
          </label>
        </div>
      </div>

      <div class="filter-actions">
        <div class="filter-actions-secondary">
          <button type="button" class="link-button" @click="advancedSearch = !advancedSearch" x-text="advancedSearch ? 'Hide advanced filters' : 'Advanced filters'"></button>
          <button type="button" class="link-button" @click="resetFilters()">Reset</button>
        </div>
        <div class="filter-actions-primary">
          <label class="checkbox-label">
            <input type="checkbox" x-model="autoRefreshEnabled" @change="toggleAutoRefresh()">
            Auto-refresh
          </label>
          <button type="submit">Search</button>
        </div>
      </div>
    </form>

    <p class="status-line" x-show="lastUpdated" style="display:none" x-text="'Updated ' + (lastUpdated ? lastUpdated.toLocaleTimeString() : '')"></p>

    <div class="spinner" x-show="loading" style="display:none">Loading…</div>
    <p class="empty" x-show="!loading && currentList().length === 0" style="display:none" x-text="viewMode === 'visits' ? 'No visits in this window.' : 'No events in this window.'"></p>

    <template x-if="viewMode === 'events'">
      <div class="grid" x-show="!loading">
        <template x-for="event in events" :key="event.id">
          <div class="card" :class="{ clickable: event.has_image || event.has_video }" @click="(event.has_image || event.has_video) && openLightbox(event)">
            <img x-show="event.has_image || event.has_video" :src="thumbnailUrl(event.id)" loading="lazy" alt="event thumbnail">
            <div class="no-image" x-show="!event.has_image && !event.has_video">no media (<span x-text="event.crop_status"></span>)</div>
            <div class="meta">
              <div><strong x-text="event.objects || 'event'"></strong> — <span x-text="event.camera"></span></div>
              <div class="ts" x-text="formatTs(event.start_ts)"></div>
              <div class="badges">
                <span class="badge" :class="'ai-' + event.ai_status" x-text="'ai: ' + event.ai_status"></span>
                <span class="badge" x-show="event.has_video">video</span>
              </div>
            </div>
          </div>
        </template>
      </div>
    </template>

    <template x-if="viewMode === 'visits'">
      <div class="grid" x-show="!loading">
        <template x-for="visit in visits" :key="visit.id">
          <div class="card" :class="{ clickable: visit.has_image || visit.has_video }" @click="(visit.has_image || visit.has_video) && openVisitLightbox(visit)">
            <img x-show="visit.has_image || visit.has_video" :src="visitThumbnailUrl(visit.id)" loading="lazy" alt="visit thumbnail">
            <div class="no-image" x-show="!visit.has_image && !visit.has_video">no media (<span x-text="visit.crop_status"></span>)</div>
            <div class="meta">
              <div><strong x-text="visit.objects || 'visit'"></strong> — <span x-text="visit.cameras"></span></div>
              <div class="ts" x-text="formatTs(visit.start_ts)"></div>
              <div class="badges">
                <span class="badge" :class="'ai-' + visit.ai_status" x-text="'ai: ' + visit.ai_status"></span>
                <span class="badge" x-show="visit.has_video">video</span>
                <span class="badge" x-show="visit.event_count > 1" x-text="visit.event_count + ' events grouped'"></span>
              </div>
            </div>
          </div>
        </template>
      </div>
    </template>

    <div class="pager" x-show="!loading && currentList().length > 0" style="display:none">
      <button @click="prevPage()" :disabled="offset === 0">Prev</button>
      <span x-text="'Page ' + (Math.floor(offset / limit) + 1)"></span>
      <button @click="nextPage()" :disabled="currentList().length < limit">Next</button>
    </div>
  </div>

  <!-- Lightbox: video by default when available, image otherwise -- toggle buttons let you
       switch between the two when an event has both. -->
  <div class="modal-backdrop" x-show="lightboxEvent" @click.self="closeLightbox()" style="display:none">
    <div class="modal lightbox">
      <button class="close" @click="closeLightbox()">&times;</button>
      <div class="lightbox-toggle" x-show="lightboxEvent && lightboxEvent.has_video && lightboxEvent.has_image" style="display:none">
        <button :class="{ active: lightboxMode === 'video' }" @click="lightboxMode = 'video'">Video</button>
        <button :class="{ active: lightboxMode === 'image' }" @click="lightboxMode = 'image'">Image</button>
      </div>
      <template x-if="lightboxEvent && lightboxEvent.has_video && lightboxMode === 'video'">
        <video controls autoplay :src="lightboxVideoUrl()"></video>
      </template>
      <template x-if="lightboxEvent && (lightboxMode === 'image' || !lightboxEvent.has_video)">
        <img :src="lightboxImageUrl()" alt="event full image">
      </template>
      <div class="lightbox-info" x-show="lightboxEvent && (lightboxEvent.visitId || lightboxEvent.ai_status === 'done')" style="display:none">
        <p class="lightbox-info-loading" x-show="lightboxLoading">Loading AI analysis…</p>
        <template x-if="!lightboxLoading">
          <!-- One block per sighting -- a plain event has at most one; a visit can have several
               (e.g. a car and a person grouped into the same real-world activity). -->
          <template x-for="group in lightboxGroups" :key="group.title + JSON.stringify(group.fields)">
            <div class="lightbox-info-group">
              <h4 x-show="lightboxGroups.length > 1" x-text="group.title"></h4>
              <dl>
                <template x-for="[label, value] in group.fields" :key="label">
                  <div class="lightbox-info-row">
                    <dt x-text="label"></dt>
                    <dd x-text="value"></dd>
                  </div>
                </template>
              </dl>
            </div>
          </template>
        </template>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
